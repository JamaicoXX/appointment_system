server {
    listen 80;
    server_name 98.91.22.123.nip.io;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;

    server_name 98.91.22.123.nip.io;

    ssl_certificate /etc/letsencrypt/live/98.91.22.123.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/98.91.22.123.nip.io/privkey.pem;

    root /var/www/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass laravel_app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}